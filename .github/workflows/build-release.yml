name: Build Prebuilt Releases

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: macos
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build release
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          chmod +x scripts/build_release.sh
          ./scripts/build_release.sh --version "$VERSION"

      - name: Generate checksums
        run: |
          cd releases
          find . -name "*.tar.gz" -type f | while read file; do
            if command -v sha256sum &>/dev/null; then
              sha256sum "$file" > "$file.sha256"
            else
              shasum -a 256 "$file" > "$file.sha256"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: releases/
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases/

      - name: Organize release files
        run: |
          mkdir -p release-upload
          find releases/ -name "*.tar.gz" -type f -exec cp {} release-upload/ \;
          find releases/ -name "*.tar.gz.sha256" -type f -exec cp {} release-upload/ \;

      - name: Generate release notes
        id: generate_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## Orbit Agent ${{ steps.get_version.outputs.version }}

          ### Prebuilt Releases

          Download the appropriate release for your platform:

          ### Installation

          ```bash
          # Download and extract
          curl -fsSL https://github.com/ayan-de/orbit-agent/releases/download/${{ steps.get_version.outputs.version }}/orbit-agent-${{ steps.get_version.outputs.version }}-linux-x64.tar.gz | tar -xz

          # Install
          cd orbit-agent-${{ steps.get_version.outputs.version }}-linux-x64
          ./install.sh
          ```

          ### Quick Install

          ```bash
          curl -fsSL https://ayande.xyz/install.sh | bash
          ```

          ### What's Included

          - Python Agent (FastAPI + LangGraph)
          - NestJS Bridge (Command execution)
          - SvelteKit Frontend (Web UI)
          - Desktop TUI (Terminal interface)

          ### Platform Support

          - Linux (x64, arm64)
          - macOS (x64, arm64)
          - Windows (WSL)

          ### Documentation

          - [README](https://github.com/ayan-de/orbit-agent)
          - [Installation Guide](https://github.com/ayan-de/orbit-agent/blob/main/docs/INSTALLATION.md)

          ### Checksums

          All release files include SHA256 checksums for verification.
          EOF

          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Orbit Agent ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-alpha') || contains(steps.get_version.outputs.version, '-beta') }}
          files: release-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-release:
    name: Test Release ${{ matrix.platform }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-x64, macos-x64]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: test-release/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract and test
        run: |
          cd test-release
          tar_file=$(ls *.tar.gz | head -1)
          tar -xzf "$tar_file"

          # Test that files exist
          extracted_dir=$(find . -maxdepth 1 -type d -name "orbit-agent-*" | head -1)
          echo "Testing extracted directory: $extracted_dir"

          if [ ! -f "$extracted_dir/start_agent.sh" ]; then
            echo "ERROR: start_agent.sh not found"
            exit 1
          fi

          if [ ! -f "$extracted_dir/requirements.txt" ]; then
            echo "ERROR: requirements.txt not found"
            exit 1
          fi

          # Verify start script exists
          if [ ! -f "$extracted_dir/start_agent.sh" ]; then
            echo "ERROR: start_agent.sh not found"
            exit 1
          fi

          echo "Release verification successful!"

  notify:
    name: Notify Release Status
    needs: [create-release, test-release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check release status
        run: |
          if [ "${{ needs.create-release.result }}" == "success" ]; then
            echo "✅ Release created successfully!"
          else
            echo "❌ Release creation failed!"
          fi

          if [ "${{ needs.test-release.result }}" == "success" ]; then
            echo "✅ Release tests passed!"
          else
            echo "❌ Release tests failed!"
          fi
